# .github/workflows/sync-irs-forms.yml
#
# Automatically refreshes IRS form PDFs in Supabase Storage.
# Runs on the 1st of every month at 08:00 UTC and can be triggered manually.
#
# Required GitHub repository secrets:
#   VITE_SUPABASE_URL         — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — Service role key (not anon!)

name: Sync IRS Form PDFs

on:
  schedule:
    - cron: "0 8 1 * *"   # 1st of every month, 08:00 UTC
  workflow_dispatch:       # manual trigger from GitHub Actions tab
    inputs:
      dry_run:
        description: "Dry run (no upload/DB update)"
        required: false
        default: "false"
        type: boolean

jobs:
  sync:
    name: Download & upload IRS PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/sync-irs-forms.ts --dry
          else
            npx tsx scripts/sync-irs-forms.ts
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::IRS form sync failed — check the logs and re-run manually if needed."
