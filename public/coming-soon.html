<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GovLetter - Hamarosan indulunk</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(circle at 20% 20%, #e0ecff 0%, #f7f9fc 45%, #ffffff 100%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 680px);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 16px;
        padding: 36px 28px;
        box-shadow: 0 12px 48px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: #dbeafe;
        color: #1d4ed8;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 42px);
        line-height: 1.15;
      }
      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.65;
        color: #334155;
      }
      .foot {
        margin-top: 18px;
        font-size: 14px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">GovLetter</span>
      <h1>Hamarosan indulunk</h1>
      <p>
        Az oldal jelenleg zárt tesztelés alatt áll. Köszönjük a türelmet,
        hamarosan nyilvánosan is elérhető lesz.
      </p>
      <p class="foot">Kapcsolat: hello@govletter.com</p>
    </main>
  </body>
</html>
